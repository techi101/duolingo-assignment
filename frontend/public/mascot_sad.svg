<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220">
  <!-- Body -->
  <ellipse cx="100" cy="145" rx="62" ry="68" fill="#58CC02"/>
  <!-- Head -->
  <circle cx="100" cy="78" r="58" fill="#58CC02"/>
  <!-- Ear tufts -->
  <ellipse cx="60" cy="28" rx="14" ry="20" fill="#46A302" transform="rotate(-20 60 28)"/>
  <ellipse cx="140" cy="28" rx="14" ry="20" fill="#46A302" transform="rotate(20 140 28)"/>
  <!-- Inner ear tufts -->
  <ellipse cx="60" cy="30" rx="8" ry="12" fill="#58CC02" transform="rotate(-20 60 30)"/>
  <ellipse cx="140" cy="30" rx="8" ry="12" fill="#58CC02" transform="rotate(20 140 30)"/>
  <!-- White belly -->
  <ellipse cx="100" cy="155" rx="42" ry="50" fill="#89E219"/>
  <!-- Wing left - drooping down for sad -->
  <ellipse cx="38" cy="158" rx="22" ry="38" fill="#46A302" transform="rotate(-20 38 158)"/>
  <!-- Wing right - drooping down for sad -->
  <ellipse cx="162" cy="158" rx="22" ry="38" fill="#46A302" transform="rotate(20 162 158)"/>
  <!-- Eye whites -->
  <circle cx="76" cy="72" r="24" fill="white"/>
  <circle cx="124" cy="72" r="24" fill="white"/>
  <circle cx="76" cy="72" r="20" fill="#f0f0f0"/>
  <circle cx="124" cy="72" r="20" fill="#f0f0f0"/>
  <!-- Pupils - looking down/sad -->
  <circle cx="78" cy="78" r="14" fill="#1a1a1a"/>
  <circle cx="126" cy="78" r="14" fill="#1a1a1a"/>
  <!-- Eye shine -->
  <circle cx="72" cy="72" r="5" fill="white"/>
  <circle cx="120" cy="72" r="5" fill="white"/>
  <circle cx="83" cy="83" r="2.5" fill="white"/>
  <circle cx="131" cy="83" r="2.5" fill="white"/>
  <!-- Eyebrows - sad / furrowed inward -->
  <path d="M56 52 Q76 46 90 54" stroke="#46A302" stroke-width="5" fill="none" stroke-linecap="round" transform="rotate(15 73 53)"/>
  <path d="M110 54 Q124 46 144 52" stroke="#46A302" stroke-width="5" fill="none" stroke-linecap="round" transform="rotate(-15 127 53)"/>
  <!-- Beak -->
  <ellipse cx="100" cy="96" rx="18" ry="11" fill="#FF9600"/>
  <ellipse cx="100" cy="101" rx="18" ry="7" fill="#E08000"/>
  <!-- Sad mouth / frown -->
  <path d="M82 114 Q100 106 118 114" stroke="#46A302" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Tear drops -->
  <ellipse cx="62" cy="94" rx="5" ry="7" fill="#1CB0F6" opacity="0.85"/>
  <path d="M62 101 Q59 106 62 110 Q65 106 62 101" fill="#1CB0F6" opacity="0.85"/>
  <ellipse cx="138" cy="94" rx="5" ry="7" fill="#1CB0F6" opacity="0.85"/>
  <path d="M138 101 Q135 106 138 110 Q141 106 138 101" fill="#1CB0F6" opacity="0.85"/>
  <!-- Feet -->
  <ellipse cx="78" cy="208" rx="18" ry="8" fill="#FF9600" transform="rotate(-10 78 208)"/>
  <ellipse cx="122" cy="208" rx="18" ry="8" fill="#FF9600" transform="rotate(10 122 208)"/>
  <ellipse cx="68" cy="212" rx="8" ry="5" fill="#E08000" transform="rotate(-20 68 212)"/>
  <ellipse cx="88" cy="213" rx="8" ry="5" fill="#E08000"/>
  <ellipse cx="112" cy="213" rx="8" ry="5" fill="#E08000"/>
  <ellipse cx="132" cy="212" rx="8" ry="5" fill="#E08000" transform="rotate(20 132 212)"/>
</svg>
